<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PACE S3 — Live Header v2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;background:#07071a;overflow:hidden;color:#fff;font-family:'Space Grotesk',sans-serif;}
.orbs{position:fixed;inset:0;pointer-events:none;z-index:0;}
.orb{position:absolute;border-radius:50%;filter:blur(90px);opacity:.42;}
.orb1{width:560px;height:560px;background:radial-gradient(circle,#4c1d95,transparent 70%);top:-140px;left:-140px;animation:o1 22s ease-in-out infinite;}
.orb2{width:420px;height:420px;background:radial-gradient(circle,#0c4a6e,transparent 70%);bottom:-120px;right:-120px;animation:o2 27s ease-in-out infinite;}
.orb3{width:340px;height:340px;background:radial-gradient(circle,#3b0764,transparent 70%);top:45%;left:48%;transform:translate(-50%,-50%);animation:o3 19s ease-in-out infinite;}
@keyframes o1{0%,100%{transform:translate(0,0)}33%{transform:translate(60px,50px)}66%{transform:translate(-40px,70px)}}
@keyframes o2{0%,100%{transform:translate(0,0)}33%{transform:translate(-55px,-35px)}66%{transform:translate(35px,-55px)}}
@keyframes o3{0%,100%{transform:translate(-50%,-50%)}50%{transform:translate(-50%,calc(-50% + 45px))}}
#stage{position:fixed;inset:0;z-index:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:50px 20px;overflow-y:auto;}
@keyframes up{to{opacity:1;transform:translateY(0);}}
@keyframes cardOut{to{opacity:0;transform:translateY(-18px);}}

.prog{display:flex;align-items:center;justify-content:center;margin-bottom:46px;width:min(580px,92vw);}
.pdot{width:46px;height:46px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;border:1.5px solid rgba(255,255,255,.12);background:rgba(255,255,255,.02);transition:all .45s cubic-bezier(.7,0,.2,1);position:relative;}
.pdot canvas{width:30px;height:30px;}
.pdot.current{border-color:rgba(255,255,255,.9);transform:scale(1.16);box-shadow:0 0 24px rgba(167,139,250,.4);}
.pdot.done{border-color:rgba(34,211,238,.45);background:rgba(34,211,238,.05);}
.pdot.done::after{content:'';position:absolute;right:-2px;top:-2px;width:13px;height:13px;border-radius:50%;background:#07071a;border:1px solid rgba(34,211,238,.8);}
.pdot.done::before{content:'';position:absolute;right:1.5px;top:1.5px;width:6px;height:6px;border-radius:50%;background:rgba(34,211,238,.95);z-index:1;}
.pline{flex:1;height:2.5px;max-width:42px;background:rgba(255,255,255,.08);position:relative;overflow:hidden;border-radius:2px;}
.pline::after{content:'';position:absolute;inset:0;width:0;background:linear-gradient(90deg,rgba(34,211,238,.6),rgba(167,139,250,.6));transition:width .5s ease;}
.pline.done::after{width:100%;}

#body{width:100%;display:flex;flex-direction:column;align-items:center;min-height:340px;}
.card{width:100%;display:flex;flex-direction:column;align-items:center;opacity:0;transform:translateY(20px);}
.card.in{animation:up .5s ease forwards;}
.card.out{animation:cardOut .35s ease forwards;}
.backstage{margin-top:28px;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.32);cursor:pointer;transition:color .2s;}
.backstage:hover{color:rgba(255,255,255,.7);}
.backstage.hidden{visibility:hidden;}

.tile-head{display:flex;align-items:center;gap:18px;margin-bottom:32px;max-width:560px;}
.tile-iconbox{width:60px;height:60px;border-radius:16px;position:relative;flex-shrink:0;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,rgba(167,139,250,.22),rgba(34,211,238,.13));
  border:1px solid rgba(255,255,255,.14);
  box-shadow:0 6px 22px rgba(167,139,250,.2), inset 0 1px 0 rgba(255,255,255,.16);
  overflow:hidden;}
.tile-iconbox::after{content:'';position:absolute;top:-60%;left:-60%;width:55%;height:220%;
  background:linear-gradient(115deg,transparent,rgba(255,255,255,.14),transparent);transform:rotate(18deg);
  animation:sheen 3.6s ease-in-out infinite;}
@keyframes sheen{0%,100%{left:-60%;}50%{left:150%;}}
.tile-iconbox canvas{width:38px;height:38px;position:relative;z-index:1;}
.tile-stage{font-size:10px;font-weight:600;letter-spacing:.26em;text-transform:uppercase;
  background:linear-gradient(90deg,rgba(167,139,250,.95),rgba(34,211,238,.85));-webkit-background-clip:text;background-clip:text;color:transparent;}
.tile-q{font-size:clamp(15px,2.1vw,20px);font-weight:500;color:#fff;line-height:1.35;margin-top:6px;max-width:340px;text-align:left;}

.tile-opts{display:flex;flex-direction:column;gap:13px;width:100%;max-width:520px;}
.tile-opt{display:flex;align-items:center;gap:16px;padding:17px 20px;cursor:pointer;border-radius:14px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);transition:all .25s;text-align:left;width:100%;position:relative;overflow:hidden;}
.tile-opt::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,rgba(167,139,250,.9),rgba(34,211,238,.9));transform:scaleY(0);transform-origin:top;transition:transform .25s;}
.tile-opt:hover{background:rgba(167,139,250,.08);border-color:rgba(167,139,250,.5);transform:translateY(-2px);box-shadow:0 10px 28px rgba(0,0,0,.35);}
.tile-opt:hover::before{transform:scaleY(1);}
.tile-badge{width:42px;height:42px;border-radius:11px;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,rgba(167,139,250,.18),rgba(34,211,238,.12));border:1px solid rgba(255,255,255,.1);transition:all .25s;}
.tile-badge svg{width:20px;height:20px;}
.tile-opt:hover .tile-badge{transform:scale(1.08);box-shadow:0 0 16px rgba(167,139,250,.3);}
.tile-text{font-size:15px;font-weight:400;color:rgba(255,255,255,.86);line-height:1.4;}
.tile-card-wrap{display:flex;flex-direction:column;align-items:center;width:100%;}

.diag{width:100%;max-width:640px;margin:8px 0 28px;}
.diagcard{display:flex;gap:14px;padding:15px 18px;margin-bottom:10px;border-radius:12px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-left:3px solid;opacity:0;transform:translateX(-14px);}
.diagcard.in{animation:slideIn .45s ease forwards;}
@keyframes slideIn{to{opacity:1;transform:translateX(0);}}
.diagcard.shaky{border-left-color:rgba(251,191,36,.8);}
.diagcard.missing{border-left-color:rgba(248,113,113,.8);}
.digi{width:34px;height:34px;border-radius:9px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.digi.shaky{background:rgba(251,191,36,.14);} .digi.missing{background:rgba(248,113,113,.14);}
.digi svg{width:18px;height:18px;}
.diagbody b{color:#fff;font-weight:600;font-size:13px;display:block;margin-bottom:3px;}
.diagbody span{font-size:12.5px;color:rgba(255,255,255,.68);line-height:1.5;}
.chain{display:flex;justify-content:center;gap:0;width:100%;flex-wrap:nowrap;}
.cstage{flex:1;display:flex;flex-direction:column;align-items:center;padding:0 4px;position:relative;}
.cstage:not(:last-child)::after{content:'';position:absolute;top:28px;right:-50%;width:100%;height:3px;background:rgba(255,255,255,.1);border-radius:2px;}
.cstage.done:not(:last-child)::after{background:linear-gradient(90deg,rgba(34,211,238,.6),rgba(167,139,250,.6));}
.cnode{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:1.5px solid rgba(255,255,255,.16);background:rgba(255,255,255,.03);z-index:1;transition:all .4s;}
.cnode canvas{width:34px;height:34px;}
.cnode.solid{border-color:rgba(34,211,238,.85);background:rgba(34,211,238,.12);box-shadow:0 0 22px rgba(34,211,238,.35);}
.cname{font-size:9px;font-weight:600;letter-spacing:.1em;color:rgba(255,255,255,.6);margin-top:13px;text-transform:uppercase;}
.cfix{font-size:8px;color:rgba(167,139,250,.8);margin-top:6px;text-align:center;opacity:0;transition:opacity .4s;min-height:10px;font-weight:500;}
.cfix.show{opacity:1;}
.actions{margin-top:22px;opacity:0;transition:opacity .5s;} .actions.show{opacity:1;}
.btn{padding:14px 32px;border-radius:30px;cursor:pointer;font-family:inherit;font-size:12px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;border:none;margin:6px;transition:all .3s;}
.btn-primary{background:linear-gradient(135deg,rgba(167,139,250,.95),rgba(34,211,238,.88));color:#07071a;}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 26px rgba(167,139,250,.4);}
.btn-ghost{background:rgba(255,255,255,.05);color:rgba(255,255,255,.7);border:1px solid rgba(255,255,255,.15);}
</style></head>

<div class="orbs"><div class="orb orb1"></div><div class="orb orb2"></div><div class="orb orb3"></div></div>

<script>
var ICON = {
  lead:    'M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14c-4 0-7 2-7 5v1h14v-1c0-3-3-5-7-5z',
  qualify: 'M9 11l3 3L22 4M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11',
  quote:   'M9 7h6M9 11h6M9 15h4M5 3h14a1 1 0 011 1v17l-3-2-2 2-2-2-2 2-2-2-3 2V4a1 1 0 011-1z',
  build:   'M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z',
  invoice: 'M12 1v22M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6',
  retain:  'M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78L12 21.23l8.84-8.84a5.5 5.5 0 000-7.78z'

var FLOW = {
  title: 'YOUR IT BUSINESS, STAGE BY STAGE',
  stages: [
    { name:'Get Leads', icon:ICON.lead,
      q:'A new prospect lands on your radar today. How did they find you?',

    { name:'Build', icon:ICON.build,

        {text:'In Slack threads and my head, mostly.', state:'shaky'},
        {text:'We find out something slipped when the client calls.', state:'missing'} ],
      diag:{ shaky:'Status lives in Slack and your memory. When two projects collide, something always slips.',
             missing:'No tracking means missed deadlines you hear about from the client, not your own system.' },

    { name:'Get Paid', icon:ICON.invoice,

      options:[
        {text:'It went out automatically and reminders chase it.', state:'solid'},

      fix:'Recurring billing + auto-reminders' },
    { name:'Retain', icon:ICON.retain,
      q:'A client\u2019s project ended 3 months ago. What\u2019s your relationship now?',
      options:[
        {text:'They\u2019re on a retainer / we check in on schedule.', state:'solid'},
        {text:'I reach out when I happen to think of them.', state:'shaky'},
        {text:'Project ended, relationship ended.', state:'missing'} ],
      diag:{ shaky:'You check in when you have a spare moment. Clients drift to whoever simply stayed in touch.',

};

var PR='rgba(167,139,250,', CY='rgba(34,211,238,', WH='rgba(255,255,255,';
function _amul(mode){ return mode==='live'?1 : mode==='done'?0.45 : 0.22; }
function _isLive(mode){ return mode==='live'; }

// 0 GET LEADS — funnel with dots flowing into it
function anim0(ctx,W,H,t,mode){
  var cx=W/2,cy=H/2,A=_amul(mode),L=_isLive(mode);
  ctx.lineWidth=1.5;ctx.lineCap='round';ctx.lineJoin='round';
  // funnel outline
  ctx.beginPath();
  ctx.moveTo(cx-9,cy-7);ctx.lineTo(cx+9,cy-7);ctx.lineTo(cx+3,cy+1);ctx.lineTo(cx+3,cy+8);
  ctx.lineTo(cx-3,cy+8);ctx.lineTo(cx-3,cy+1);ctx.closePath();
  ctx.strokeStyle=PR+(0.85*A)+')';ctx.stroke();
  // incoming dots
  for(var k=0;k<3;k++){
    var sp=L?((t*0.6+k*0.33)%1):0.6;
    var x=cx-12+k*12, y=cy-15+sp*7;
    ctx.beginPath();ctx.arc(x,y,1.5,0,7);ctx.fillStyle=(k%2?CY:PR)+((0.4+sp*0.5)*A)+')';ctx.fill();
  }
  // drop out the bottom
  var dp=L?((t*0.9)%1):0.5;
  ctx.beginPath();ctx.arc(cx,cy+9+dp*5,1.6,0,7);ctx.fillStyle=CY+((1-dp)*A)+')';ctx.fill();
}
// 1 SCOPE — magnifier with a small sweep
function anim1(ctx,W,H,t,mode){
  var cx=W/2,cy=H/2,A=_amul(mode),L=_isLive(mode);
  ctx.lineWidth=1.5;ctx.lineCap='round';
  var sweep=L?Math.sin(t*1.6)*3:0;
  var gx=cx-2+sweep, gy=cy-2, r=7;
  ctx.beginPath();ctx.arc(gx,gy,r,0,7);ctx.strokeStyle=CY+(0.85*A)+')';ctx.stroke();
  ctx.beginPath();ctx.moveTo(gx+r*0.7,gy+r*0.7);ctx.lineTo(gx+r*1.5,gy+r*1.5);ctx.strokeStyle=PR+(0.8*A)+')';ctx.stroke();
  // focus pulse dot
  var p=L?(Math.sin(t*3)*0.5+0.5):0.5;
  ctx.beginPath();ctx.arc(gx,gy,1.4+(L?p*1.3:0.6),0,7);ctx.fillStyle=PR+((0.5+(L?p*0.4:0))*A)+')';ctx.fill();
}
// 2 PROPOSAL — document with lines writing in
function anim2(ctx,W,H,t,mode){
  var cx=W/2,cy=H/2,A=_amul(mode),L=_isLive(mode);
  ctx.lineWidth=1.5;ctx.lineCap='round';ctx.lineJoin='round';
  var dw=13,dh=17,dx=cx-dw/2,dy=cy-dh/2;
  // doc body with folded corner
  ctx.beginPath();
  ctx.moveTo(dx,dy);ctx.lineTo(dx+dw-4,dy);ctx.lineTo(dx+dw,dy+4);ctx.lineTo(dx+dw,dy+dh);ctx.lineTo(dx,dy+dh);ctx.closePath();
  ctx.strokeStyle=PR+(0.85*A)+')';ctx.stroke();
  ctx.beginPath();ctx.moveTo(dx+dw-4,dy);ctx.lineTo(dx+dw-4,dy+4);ctx.lineTo(dx+dw,dy+4);ctx.strokeStyle=PR+(0.5*A)+')';ctx.stroke();
  // writing lines
  for(var l=0;l<3;l++){
    var prog=L?Math.max(0,Math.min(1,((t*0.8)-(l*0.3))%1.8)):1;
    var lw=(dw-7)*(l===2?0.6:1)*prog;
    ctx.beginPath();ctx.moveTo(dx+3,dy+5+l*4);ctx.lineTo(dx+3+lw,dy+5+l*4);
    ctx.strokeStyle=(l%2?CY:WH)+((0.4+l*0.05)*A)+')';ctx.stroke();
  }
}
// 3 BUILD — three blocks stacking
function anim3(ctx,W,H,t,mode){
  var cx=W/2,cy=H/2,A=_amul(mode),L=_isLive(mode);
  ctx.lineWidth=1.5;ctx.lineJoin='round';
  var s=7;
  var blocks=[[-1,1],[1,1],[0,0]]; // bottom-left, bottom-right, top
  blocks.forEach(function(b,i){
    var settle=L?((Math.sin(t*1.5+i*1.4)+1)/2):1;
    var bx=cx+b[0]*(s*0.55)-s/2;
    var by=cy+b[1]*(s*0.55)-s/2 - (1-settle)*3;
    ctx.beginPath();ctx.rect(bx,by,s,s);
    ctx.strokeStyle=(i===2?CY:PR)+(0.85*A)+')';ctx.stroke();
  });
}
// 4 GET PAID — coin ring with checkmark
function anim4(ctx,W,H,t,mode){
  var cx=W/2,cy=H/2,A=_amul(mode),L=_isLive(mode);
  ctx.lineWidth=1.5;ctx.lineCap='round';ctx.lineJoin='round';
  ctx.beginPath();ctx.arc(cx,cy,8,0,7);ctx.strokeStyle=PR+(0.85*A)+')';ctx.stroke();
  var cp=L?Math.min(1,((t*0.9)%1.8)):1;
  ctx.beginPath();ctx.moveTo(cx-3.5,cy+0.5);
  if(cp>0.35)ctx.lineTo(cx-1,cy+3);
  if(cp>0.7)ctx.lineTo(cx+4,cy-3);
  ctx.strokeStyle=CY+(0.9*A)+')';ctx.lineWidth=1.8;ctx.stroke();
}
// 5 RETAIN — circular return arrow with orbiting dot
function anim5(ctx,W,H,t,mode){
  var cx=W/2,cy=H/2,A=_amul(mode),L=_isLive(mode);
  ctx.lineWidth=1.5;ctx.lineCap='round';ctx.lineJoin='round';
  ctx.beginPath();ctx.arc(cx,cy,7,Math.PI*0.35,Math.PI*1.95);ctx.strokeStyle=CY+(0.85*A)+')';ctx.stroke();
  // arrowhead
  var ea=Math.PI*1.95,ax=cx+Math.cos(ea)*7,ay=cy+Math.sin(ea)*7;
  ctx.beginPath();ctx.moveTo(ax,ay);ctx.lineTo(ax-3,ay-1.5);ctx.moveTo(ax,ay);ctx.lineTo(ax-0.5,ay+3);ctx.strokeStyle=CY+(0.85*A)+')';ctx.stroke();
  // orbiting dot
  var a=L?(t*1.4):0.8;
  ctx.beginPath();ctx.arc(cx+Math.cos(a)*7,cy+Math.sin(a)*7,1.6,0,7);ctx.fillStyle=PR+(0.9*A)+')';ctx.fill();
}
var STAGE_ANIM=[anim0,anim1,anim2,anim3,anim4,anim5];

var idx=0, answers=FLOW.stages.map(function(){return null;});
var chainRafs=[];

function runCanvas(cnv,fnIdx,mode){
  var ctx=cnv.getContext('2d'),W=cnv.width,H=cnv.height,t=0,raf;
  function fr(){t+=0.04;ctx.clearRect(0,0,W,H);STAGE_ANIM[fnIdx](ctx,W,H,t,mode);raf=requestAnimationFrame(fr);}
  fr();
  return function(){cancelAnimationFrame(raf);};
}

function buildProg(){
  var p=document.getElementById('prog'); p.innerHTML=''; chainRafs.forEach(function(s){s();});chainRafs=[];
  FLOW.stages.forEach(function(s,i){
    var d=document.createElement('div'); d.className='pdot'; d.id='pdot'+i;
    var c=document.createElement('canvas');c.width=30;c.height=30;d.appendChild(c);
    p.appendChild(d);
    if(i<FLOW.stages.length-1){var l=document.createElement('div');l.className='pline';l.id='pline'+i;p.appendChild(l);}
  });
}
function paintProg(){
  chainRafs.forEach(function(s){s();});chainRafs=[];
  FLOW.stages.forEach(function(s,i){
    var d=document.getElementById('pdot'+i); if(!d)return;
    var cls='pdot',mode='next';
    if(answers[i]){cls+=' done';mode='done';}
    if(i===idx){cls+=' current';mode='live';}
    d.className=cls;
    var cnv=d.querySelector('canvas');
    chainRafs.push(runCanvas(cnv,i,mode));
    var l=document.getElementById('pline'+i); if(l)l.className='pline'+(answers[i]?' done':'');
  });
}
function shuffle(a){a=a.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}

var WARN='M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0zM12 9v4M12 17h.01';
var GLY={a:'M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5',
  b:'M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z',
  c:'M3 3v18h18M7 16l4-4 4 4 5-6'};

var headStop=null;
function renderCard(st,i,opts){
  var glyset=[GLY.a,GLY.b,GLY.c];
  var o=opts.map(function(op,k){
    return '<button class="tile-opt" data-state="'+op.state+'">'+
      '<span class="tile-badge"><svg viewBox="0 0 24 24" fill="none" stroke="url(#pg)" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="'+glyset[k]+'"/></svg></span>'+
      '<span class="tile-text">'+op.text+'</span></button>';
  }).join('');
  return '<div class="tile-card-wrap"><div class="tile-head"><div class="tile-iconbox"><canvas width="38" height="38"></canvas></div>'+
    '<div><div class="tile-stage">'+st.name+'</div><div class="tile-q">'+st.q+'</div></div></div>'+
    '<svg width="0" height="0"><defs><linearGradient id="pg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="rgba(167,139,250,.95)"/><stop offset="1" stop-color="rgba(34,211,238,.9)"/></linearGradient></defs></svg>'+
    '<div class="tile-opts">'+o+'</div>'+
    '<div class="backstage'+(i===0?' hidden':'')+'">&#8592; previous</div></div>';
}

function renderStage(i){
  idx=i; paintProg();
  var st=FLOW.stages[i];
  var body=document.getElementById('body'); body.innerHTML='';
  var card=document.createElement('div'); card.className='card';
  card.innerHTML=renderCard(st,i,shuffle(st.options));
  body.appendChild(card);
  var hc=card.querySelector('.tile-iconbox canvas');
  if(headStop)headStop();
  headStop=runCanvas(hc,i,'live');
  requestAnimationFrame(function(){card.classList.add('in');});
  card.querySelectorAll('[data-state]').forEach(function(el){
    el.addEventListener('click',function(){
      answers[i]=el.getAttribute('data-state');
      card.classList.remove('in');card.classList.add('out');
      setTimeout(function(){ i<FLOW.stages.length-1?renderStage(i+1):renderDiag(); },320);
    });
  });
  var b=card.querySelector('.backstage');
  if(b)b.addEventListener('click',function(){if(i===0)return;card.classList.remove('in');card.classList.add('out');setTimeout(function(){renderStage(i-1);},320);});
}

function renderDiag(){
  paintProg();
  document.getElementById('body').innerHTML='';
  var diag=document.getElementById('diag'); diag.innerHTML='';
  var weak=[];
  FLOW.stages.forEach(function(s,i){ if(answers[i]==='shaky'||answers[i]==='missing')weak.push({s:s,st:answers[i]}); });
  if(weak.length===0){
    var l=document.createElement('div');l.className='diagcard shaky in';
    l.innerHTML='<div class="digi shaky"><svg viewBox="0 0 24 24" fill="none" stroke="rgba(251,191,36,.9)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="'+WARN+'"/></svg></div><div class="diagbody"><b>Tight ship</b><span>You ran the table. Either you\u2019ve built a solid operation, or there\u2019s a blind spot worth fresh eyes. Worth a conversation either way.</span></div>';
    diag.appendChild(l);
  } else {
    weak.forEach(function(w,i){
      var col=w.st==='shaky'?'rgba(251,191,36,.9)':'rgba(248,113,113,.9)';
      var l=document.createElement('div');l.className='diagcard '+w.st;
      l.innerHTML='<div class="digi '+w.st+'"><svg viewBox="0 0 24 24" fill="none" stroke="'+col+'" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="'+WARN+'"/></svg></div><div class="diagbody"><b>'+w.s.name+'</b><span>'+(w.st==='shaky'?w.s.diag.shaky:w.s.diag.missing)+'</span></div>';
      diag.appendChild(l); setTimeout(function(){l.classList.add('in');},150+i*280);
    });
  }
  var delay=150+weak.length*280+300, a=document.getElementById('actions');
  setTimeout(function(){a.innerHTML='<button class="btn btn-primary" id="ideal">Show me the ideal flow</button>';a.classList.add('show');
    document.getElementById('ideal').addEventListener('click',renderIdeal);},delay);
}

function renderIdeal(){
  chainRafs.forEach(function(s){s();});chainRafs=[];
  document.getElementById('diag').innerHTML='';
  document.getElementById('actions').classList.remove('show');
  var body=document.getElementById('body'); body.innerHTML='';
  var chain=document.createElement('div'); chain.className='chain';
  FLOW.stages.forEach(function(s,i){
    var st=document.createElement('div');st.className='cstage';
    st.innerHTML='<div class="cnode" id="in'+i+'"><canvas width="34" height="34"></canvas></div><div class="cname">'+s.name+'</div><div class="cfix" id="if'+i+'">'+s.fix+'</div>';
    chain.appendChild(st);
  });
  body.appendChild(chain);
  var stages=chain.querySelectorAll('.cstage');
  stages.forEach(function(st,i){
    var cnv=document.getElementById('in'+i).querySelector('canvas');
    chainRafs.push(runCanvas(cnv,i,'live'));
    setTimeout(function(){document.getElementById('in'+i).className='cnode solid';st.classList.add('done');document.getElementById('if'+i).classList.add('show');},i*180);
  });
  var a=document.getElementById('actions');
  setTimeout(function(){a.innerHTML='<button class="btn btn-primary" id="talk">Let\u2019s close these gaps</button><button class="btn btn-ghost" id="restart">Start over</button>';a.classList.add('show');
    document.getElementById('restart').addEventListener('click',function(){idx=0;answers=FLOW.stages.map(function(){return null;});buildProg();renderStage(0);});
  },stages.length*180+300);
}

buildProg(); renderStage(0);
</script></body></html>
